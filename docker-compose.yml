services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cp-myanez-landing
    restart: unless-stopped
    # Expose port internally for Coolify's reverse proxy (Traefik/nginx)
    # Do NOT bind to host ports — Coolify handles routing
    expose:
      - "80"
    networks:
      - coolify

networks:
  coolify:
    external: true
